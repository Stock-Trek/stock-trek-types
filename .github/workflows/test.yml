name: Test

on:
  push:
    branches:
      - '**'
      - '!master'

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Get secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: "c603d49b-292c-42ae-b838-52e03e3c3a84"
          project-slug: "agents"
          env-slug: "dev"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run checks
        run: |
          cargo fmt --check
          cargo clippy
          cargo test
